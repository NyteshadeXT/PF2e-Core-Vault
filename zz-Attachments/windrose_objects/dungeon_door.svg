<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-labelledby="title desc">
  <title id="title">Aetheria Fracta Dungeon Door Map Icon</title>
  <desc id="desc">A stylized runed stone dungeon doorway with a portal, crystal accents, and base plinth.</desc>
  <defs>
    <style>
      .line{fill:none;stroke:#111;stroke-width:14;stroke-linecap:round;stroke-linejoin:round}
      .thin{fill:none;stroke:#111;stroke-width:10;stroke-linecap:round;stroke-linejoin:round}
      .stone{fill:#f7f7f7;stroke:#111;stroke-width:14;stroke-linecap:round;stroke-linejoin:round}
      .portal{fill:#ffffff;stroke:#111;stroke-width:12;stroke-linecap:round;stroke-linejoin:round}
      .rune{fill:none;stroke:#111;stroke-width:8;stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>

